<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{$t('app.title')}}</title>
  <link href="./global.css" rel="stylesheet">
  <script type="module" key='vhtml' src="/vhtml/vhtml.min.js"></script>
  <style>
    /* 基础布局样式 */
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .app-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      flex-shrink: 0;
      border-right: 1px solid var(--v-border-color);
      background-color: var(--v-bg-color);
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      background-color: var(--v-bg-color-secondary);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--v-border-color);
    }

    .top-bar {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 100;
    }

    .theme-switcher {
      background: var(--v-bg-color);
      padding: 0.5rem;
      border-radius: var(--v-radius-md);
      box-shadow: var(--v-shadow-md);
      border: 1px solid var(--v-border-color);
    }

    .lang-wrapper {
      background: var(--v-bg-color);
      padding: 0.35rem 0.5rem;
      border-radius: var(--v-radius-md);
      box-shadow: var(--v-shadow-md);
      border: 1px solid var(--v-border-color);
    }

    /* 主题 T1: 默认清爽风格 (覆盖 common.css 中的默认值) */
    body[theme="t1"] {
      --v-bg-color: #ffffff;
      --v-bg-color-secondary: #f9fafb;
      --v-text-color: #111827;
      --v-color-primary: #3b82f6;
      --v-color-primary-hover: #2563eb;
      --v-radius-md: 4px;
      --v-font-family: system-ui, -apple-system, sans-serif;
    }

    /* 主题 T2: 暗黑/霓虹风格 */
    body[theme="t2"] {
      --v-bg-color: #0f172a;
      --v-bg-color-secondary: #1e293b;
      --v-text-color: #e2e8f0;
      --v-text-color-secondary: #94a3b8;

      --v-color-primary: #8b5cf6;
      /* 紫色主调 */
      --v-color-primary-hover: #7c3aed;
      --v-color-primary-text: #ffffff;

      --v-color-success: #10b981;
      --v-color-danger: #f43f5e;

      --v-border-color: #334155;
      --v-radius-md: 12px;
      /* 更大的圆角 */
      --v-radius-sm: 8px;
      --v-radius-lg: 16px;

      --v-font-family: "Menlo", "Monaco", "Courier New", monospace;
      /* 极客字体 */
    }

    /* 辅助样式 */
    body .section-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 1.5rem;
      color: var(--v-text-color);
      border-left: 4px solid var(--v-color-primary);
      padding-left: 0.5rem;
    }

    body .demo-block {
      background-color: var(--v-bg-color);
      padding: 1.5rem;
      border-radius: var(--v-radius-md);
      border: 1px solid var(--v-border-color);
      margin-bottom: 1.5rem;
      box-shadow: var(--v-shadow-sm);
    }

    body .demo-label {
      font-size: 0.875rem;
      color: var(--v-text-color-secondary);
      margin-bottom: 0.5rem;
      display: block;
    }

    /* 侧边栏自定义样式 */
    .sidebar-logo {
      padding: 1.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--v-color-primary);
      border-bottom: 1px solid var(--v-border-color);
      text-align: center;
    }

    .sidebar-menu {
      padding: 1rem 0;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      color: var(--v-text-color);
      transition: all 0.2s ease;
      text-decoration: none;
      border-left: 3px solid transparent;
    }

    .sidebar-item:hover {
      background-color: var(--v-bg-color-secondary);
      color: var(--v-color-primary);
    }

    .sidebar-item.active {
      background-color: var(--v-blue-50);
      color: var(--v-color-primary);
      border-left-color: var(--v-color-primary);
      font-weight: 500;
    }

    .sidebar-icon {
      width: 20px;
      height: 20px;
      margin-right: 0.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-label {
      font-size: 0.95rem;
    }
  </style>
</head>

<body :theme="theme" class="h-full w-full">

  <div class="app-layout">
    <!-- 侧边导航 -->
    <aside class="sidebar" style="width: 220px;">
      <div class="sidebar-logo">{{$t('app.logo')}}</div>
      <nav class="sidebar-menu">
        <div v-for="item in menuItems" class="sidebar-item" :class="{active: currentExample === item.value}"
          @click="selectExample(item.value)">
          <span class="sidebar-icon" v-html="item.icon"></span>
          <span class="sidebar-label">{{ item.label }}</span>
        </div>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部工具栏 -->
      <div class="top-bar">
        <div class="lang-wrapper">
          <div vsrc='lang'></div>
        </div>
        <div class="theme-switcher v-flex v-items-center v-gap-sm">
          <span class="v-text-secondary v-font-bold">{{$t('theme.label')}}</span>
          <div vsrc='/btn.html' size="sm" :type="theme === 't1' ? 'primary' : 'default'" @click="setTheme('t1')">
            {{$t('theme.light')}}
          </div>
          <div vsrc='/btn.html' size="sm" :type="theme === 't2' ? 'primary' : 'default'" @click="setTheme('t2')">
            {{$t('theme.dark')}}
          </div>
        </div>
      </div>

      <div class="container">
        <header class="header">
          <h1 class="v-font-bold" style="font-size: 2.5rem; color: var(--v-color-primary);">{{$t('app.logo')}}</h1>
          <p class="v-mt-sm v-text-secondary">{{$t('app.subtitle')}}</p>
        </header>

        <!-- 动态显示选中的示例 -->
        <div v-if="currentExample === 'btn'" class="demo-block">
          <examples-btn></examples-btn>
        </div>
        <div v-if="currentExample === 'tree'" class="demo-block">
          <examples-tree></examples-tree>
        </div>
        <div v-if="currentExample === 'sidebar'" class="demo-block">
          <examples-sidebar></examples-sidebar>
        </div>
        <div v-if="currentExample === 'tabs'" class="demo-block">
          <examples-tabs></examples-tabs>
        </div>
        <div v-if="currentExample === 'dialog'" class="demo-block">
          <examples-dialog></examples-dialog>
        </div>
        <div v-if="currentExample === 'dropdown'" class="demo-block">
          <examples-dropdown></examples-dropdown>
        </div>
        <div v-if="currentExample === 'input'" class="demo-block">
          <examples-input></examples-input>
        </div>
        <div v-if="currentExample === 'form'" class="demo-block">
          <examples-form></examples-form>
        </div>
      </div>
    </main>
  </div>

  <script setup>
    theme = 't1';
    currentExample = 'btn';

    menuItems = [
      {
        label: () => $t('menu.btn'),
        value: 'btn',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="2"></rect></svg>'
      },
      {
        label: () => $t('menu.tree'),
        value: 'tree',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M8 7h8M8 12h8M8 17h8"/></svg>'
      },
      {
        label: () => $t('menu.sidebar'),
        value: 'sidebar',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>'
      },
      {
        label: () => $t('menu.tabs'),
        value: 'tabs',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line></svg>'
      },
      {
        label: () => $t('menu.dialog'),
        value: 'dialog',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="2"></rect><line x1="5" y1="9" x2="19" y2="9"></line></svg>'
      },
      {
        label: () => $t('menu.dropdown'),
        value: 'dropdown',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>'
      },
      {
        label: () => $t('menu.input'),
        value: 'input',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="2"></rect><line x1="8" y1="10" x2="16" y2="10"></line><line x1="8" y1="14" x2="12" y2="14"></line></svg>'
      },
      {
        label: () => $t('menu.form'),
        value: 'form',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="9" y1="9" x2="15" y2="9"></line><line x1="9" y1="12" x2="15" y2="12"></line><line x1="9" y1="15" x2="12" y2="15"></line></svg>'
      }
    ];

    setTheme = (t) => {
      theme = t;
    };

    selectExample = (value) => {
      currentExample = value;
    };
  </script>

</html>
