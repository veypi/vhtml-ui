<!DOCTYPE html>
<html>

<head>
  <link href="./global.css" rel="stylesheet">
</head>

<style>
  body {
    display: inline-block;
  }

  .lang-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: var(--v-spacing-xs) var(--v-spacing-sm);
    border-radius: var(--v-radius-full);
    background-color: var(--v-bg-color-tertiary);
    transition: all var(--v-transition-base);
    border: 1px solid var(--v-border-color);
    user-select: none;
    min-width: 64px;
  }

  .lang-toggle:hover {
    background-color: var(--v-bg-color-secondary);
    border-color: var(--v-border-color-hover);
    box-shadow: var(--v-shadow-sm);
  }

  .lang-toggle:active {
    transform: scale(0.96);
  }

  .lang-option {
    font-size: var(--v-font-size-sm);
    color: var(--v-text-color-tertiary);
    font-weight: var(--v-font-weight-medium);
    transition: all var(--v-transition-fast);
    line-height: 1;
    padding: 2px 4px;
    border-radius: var(--v-radius-sm);
  }

  .lang-option.active {
    color: var(--v-color-primary);
    font-weight: var(--v-font-weight-bold);
    background-color: var(--v-bg-color);
    box-shadow: var(--v-shadow-sm);
  }

  .lang-divider {
    margin: 0 var(--v-spacing-xs);
    color: var(--v-border-color-hover);
    font-weight: var(--v-font-weight-normal);
    transform: scaleY(0.9);
    font-size: var(--v-font-size-xs);
  }
</style>

<body>
  <div class="lang-toggle" @click="toggleLang" title="点击切换语言 / Click to switch language">
    <span class="lang-option" :class="{active: currentLang === 'zh-CN'}">中</span>
    <span class="lang-divider">/</span>
    <span class="lang-option" :class="{active: currentLang === 'en-US'}">En</span>
  </div>
</body>

<script setup>
  currentLang = $i18n.getLocale()
  toggleLang = () => {
    const newLang = currentLang === 'zh-CN' ? 'en-US' : 'zh-CN';
    $i18n.setLocale(newLang);
    currentLang = newLang;
  };
</script>

</html>
