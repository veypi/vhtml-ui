<!DOCTYPE html>
<html>

<head>
  <meta name="description" content="Dialog Component Demo" />
  <title>{{$t('dialog.title')}}</title>
</head>

<body>
  <div class="section-title">{{$t('dialog.title')}}</div>

  <div class="v-mb-md">
    <span class="demo-label">{{$t('dialog.basic')}}</span>
    <div class="v-flex v-gap-sm">
      <div vsrc='/btn' @click="visible = true">{{$t('dialog.clickToOpen')}}</div>
    </div>
  </div>

  <div vsrc='/dialog.html' v:visible="visible" :title="$t('dialog.hint')" width="30%">
    <span>{{$t('dialog.message')}}</span>
    <div vslot="footer">
      <div vsrc='/btn' @click="visible = false">{{$t('dialog.cancel')}}</div>
      <div vsrc='/btn' variant="default" @click="visible = false">{{$t('dialog.confirm')}}</div>
    </div>
  </div>

  <div class="v-mb-md">
    <span class="demo-label">{{$t('dialog.customContent')}}</span>
    <div class="v-flex v-gap-sm">
      <div vsrc='/btn' @click="visible2 = true">{{$t('dialog.customContent')}}</div>
    </div>
  </div>

  <div vsrc='/dialog.html' v:visible="visible2" :title="$t('dialog.customContent')" width="50%">
    <div class="v-flex v-flex-col v-gap-md">
      <p>{{$t('dialog.customDesc')}}</p>
      <div class="v-p-md v-bg-secondary v-rounded-md">
        {{$t('dialog.mockForm')}}
      </div>
    </div>
    <div vslot="footer">
      <div vsrc='/btn' @click="visible2 = false">{{$t('dialog.close')}}</div>
    </div>
  </div>

</body>
<script setup>
  visible = false;
  visible2 = false;
</script>

</html>
