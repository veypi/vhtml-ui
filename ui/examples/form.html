<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Form Component Demo">
  <title>{{$t('form.title')}}</title>
</head>
<style>
  body {
    padding: 20px;
  }

  .demo-section {
    margin-bottom: 40px;
    padding: 24px;
    border: 1px solid #eee;
    border-radius: 12px;
    max-width: 600px;
    margin: 0 auto;
  }

  .demo-title {
    font-size: 1.5em;
    margin-bottom: 24px;
    font-weight: bold;
    text-align: center;
  }
</style>

<body layout="default">
  <div class="demo-section">
    <div class="demo-title">{{$t('form.title')}}</div>

    <form @submit.prevent="onSubmit" @reset.prevent='onReset'
      style="display: grid; gap: 16px; grid-template-columns: 1fr 1fr;">
      <div vsrc='input' v-for="item in formItems" :label="item.label" :type="item.type || 'text'"
        :required="item.required" :placeholder="item.placeholder" :opts="item.opts" v:value="formData[item.name]"
        :style="item.full ? 'grid-column: span 2;' : ''"></div>

      <div style="grid-column: span 2; display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;">
        <div vsrc='btn' type='reset'>{{$t('form.reset')}}</div>
        <div vsrc='btn' type="submit">{{$t('form.ok')}}</div>
      </div>
    </form>

    <div style="margin-top: 30px; padding: 16px; background: #f9f9f9; border-radius: 8px;">
      <h4 style="margin-top: 0;">{{$t('form.liveData')}}:</h4>
      <pre style="margin: 0; font-size: 12px; color: #666;">{{ JSON.stringify(formData, null, 2) }}</pre>
    </div>
  </div>
</body>

<script setup>
  formData = {
    name: 'John Doe',
    age: 25,
    city: 'bj',
    roles: ['dev'],
    agree: true,
    bio: ''
  };

  formItems = [
    {
      name: 'name',
      label: () => $t('form.name'),
      placeholder: () => $t('form.namePlaceholder'),
      required: true
    },
    {
      name: 'age',
      type: 'number',
      label: () => $t('form.age'),
      placeholder: () => $t('form.agePlaceholder'),
      validate: /^\d+$/
    },
    {
      name: 'city',
      type: 'select',
      label: () => $t('form.city'),
      opts: {
        options: [
          {label: () => $t('form.beijing'), value: 'bj'},
          {label: () => $t('form.shanghai'), value: 'sh'},
          {label: () => $t('form.guangzhou'), value: 'gz'}
        ]
      }
    },
    {
      name: 'roles',
      type: 'checkbox',
      label: () => $t('form.roles'),
      opts: {
        options: [
          {label: () => $t('form.dev'), value: 'dev'},
          {label: () => $t('form.des'), value: 'des'},
          {label: () => $t('form.pm'), value: 'pm'}
        ]
      }
    },
    {
      name: 'bio',
      type: 'textarea',
      label: () => $t('form.bio'),
      placeholder: () => $t('form.bioPlaceholder'),
      opts: {rows: 4},
      full: true
    },
    {
      name: 'agree',
      type: 'checkbox',
      placeholder: () => $t('form.agreeProtocol'),
      required: true,
      full: true
    }
  ];

  onSubmit = () => {
    console.log("Form submitted:", formData);
    $message.success($t('form.submitSuccess'));
  };

  onReset = () => {
    // Reset data to initial state
    formData = {
      name: '',
      age: null,
      city: '',
      roles: [],
      agree: false,
      bio: ''
    };
    $message.info($t('form.resetMsg'));
  };
</script>

</html>
