<!DOCTYPE html>
<html>
<head>
  <meta name="description" content="Dropdown Component Demo" />
  <title>{{$t('dropdown.title')}}</title>
</head>
<body>
  <div class="section-title">{{$t('dropdown.title')}}</div>

  <div class="v-mb-md">
    <span class="demo-label">{{$t('dropdown.basic')}}</span>
    <div class="v-flex v-gap-md">
        <div vsrc='/dropdown.html' :items="menuItems" @command="handleCommand">
            <div vsrc='/btn.html'>
                Dropdown List
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" class="v-ml-xs">
                    <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <div vsrc='/dropdown.html' :items="menuItems" placement="top-end">
            <div vsrc='/btn.html' variant="outline">{{$t('dropdown.topEnd')}}</div>
        </div>
    </div>
  </div>

  <div class="v-mb-md">
    <span class="demo-label">{{$t('dropdown.customMenu')}}</span>
    <div class="v-flex v-gap-md">
        <div vsrc='/dropdown.html'>
            <div vsrc='/btn.html' variant="secondary">{{$t('dropdown.customMenuBtn')}}</div>
            <div vslot="menu" class="v-p-sm">
                <div class="v-text-secondary v-text-xs v-mb-xs">{{$t('dropdown.userInfo')}}</div>
                <div class="v-font-bold">{{$t('dropdown.admin')}}</div>
                <div class="v-my-sm" style="border-top: 1px solid var(--v-border-color)"></div>
                <div vsrc='/btn.html' size="sm" :block="true">{{$t('dropdown.logout')}}</div>
            </div>
        </div>
    </div>
  </div>

</body>
<script setup>
  menuItems = [
      { label: () => $t('dropdown.action1'), value: "1" },
      { label: () => $t('dropdown.action2'), value: "2" },
      { label: () => $t('dropdown.action3'), value: "3", divided: true },
      { label: () => $t('dropdown.disabled'), value: "4", disabled: true }
  ];

  handleCommand = (val) => {
      $message.info($t('dropdown.selected') + ": " + val);
  }
</script>
</html>
